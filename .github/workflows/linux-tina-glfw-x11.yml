name: linux-tina-glfw-x11

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/linux-tina-glfw-x11.yml"
      - "scripts/validateTinaGlfwX11Linux.sh"
      - "3rdparty/tina_glfw/**"
      - "src/platform/CMakeLists.txt"
      - "src/platform/glfw/**"
      - "CMakeLists.txt"
  push:
    paths:
      - ".github/workflows/linux-tina-glfw-x11.yml"
      - "scripts/validateTinaGlfwX11Linux.sh"
      - "3rdparty/tina_glfw/**"
      - "src/platform/CMakeLists.txt"
      - "src/platform/glfw/**"
      - "CMakeLists.txt"

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux X11 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            xorg-dev \
            libgl1-mesa-dev
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Build tina_glfw X11
        shell: bash
        run: |
          bash ./scripts/validateTinaGlfwX11Linux.sh
