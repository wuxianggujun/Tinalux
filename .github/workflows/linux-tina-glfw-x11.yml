name: linux-tina-glfw-x11

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/linux-tina-glfw-x11.yml"
      - "tests/scripts/ci_metadata_contract_smoke.ps1"
      - "tests/scripts/ci_execution_summary_threshold_guard.ps1"
      - "tests/scripts/ci_metadata_fetch_baseline.ps1"
      - "tests/scripts/ci_metadata_validate.ps1"
      - "tests/scripts/ci_metadata_manifest_helpers.ps1"
      - "scripts/validateTinaGlfwX11Linux.sh"
      - "tests/scripts/linux_tina_glfw_x11_ci_metadata.ps1"
      - "tests/scripts/linux_tina_glfw_x11_build_run.ps1"
      - "tests/scripts/linux_tina_glfw_x11_build_summary.ps1"
      - "3rdparty/tina_glfw/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/linux-tina-glfw-x11.yml"
      - "tests/scripts/ci_metadata_contract_smoke.ps1"
      - "tests/scripts/ci_execution_summary_threshold_guard.ps1"
      - "tests/scripts/ci_metadata_fetch_baseline.ps1"
      - "tests/scripts/ci_metadata_validate.ps1"
      - "tests/scripts/ci_metadata_manifest_helpers.ps1"
      - "scripts/validateTinaGlfwX11Linux.sh"
      - "tests/scripts/linux_tina_glfw_x11_ci_metadata.ps1"
      - "tests/scripts/linux_tina_glfw_x11_build_run.ps1"
      - "tests/scripts/linux_tina_glfw_x11_build_summary.ps1"
      - "3rdparty/tina_glfw/**"

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI Metadata Contract Check
        shell: pwsh
        run: ./tests/scripts/ci_metadata_contract_smoke.ps1 -RepoRoot .

      - name: Install Linux X11 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            xorg-dev \
            libgl1-mesa-dev
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Capture Linux X11 Build Metadata
        shell: pwsh
        env:
          TINALUX_LINUX_X11_BUILD_DIR: ${{ github.workspace }}/build/tina_glfw-linux-x11/${{ matrix.compiler }}
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
        run: >
          ./tests/scripts/linux_tina_glfw_x11_ci_metadata.ps1
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT
          -BuildDir $env:TINALUX_LINUX_X11_BUILD_DIR
          -Compiler ${{ matrix.compiler }}

      - name: Build tina_glfw X11
        shell: pwsh
        env:
          TINALUX_LINUX_X11_BUILD_DIR: ${{ github.workspace }}/build/tina_glfw-linux-x11/${{ matrix.compiler }}
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
        run: >
          ./tests/scripts/linux_tina_glfw_x11_build_run.ps1
          -RepoRoot .
          -BuildDir $env:TINALUX_LINUX_X11_BUILD_DIR
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT
          -Compiler ${{ matrix.compiler }}

      - name: Capture Linux X11 Build Summary
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_LINUX_X11_BUILD_DIR: ${{ github.workspace }}/build/tina_glfw-linux-x11/${{ matrix.compiler }}
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
        run: >
          ./tests/scripts/linux_tina_glfw_x11_build_summary.ps1
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT
          -BuildDir $env:TINALUX_LINUX_X11_BUILD_DIR
          -Compiler ${{ matrix.compiler }}

      - name: Fetch Linux X11 Baseline Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
          TINALUX_CI_BASELINE_BRANCH: ${{ github.base_ref || github.ref_name }}
          TINALUX_CI_BASELINE_FALLBACK_BRANCH: ${{ github.event.repository.default_branch }}
        run: >
          ./tests/scripts/ci_metadata_fetch_baseline.ps1
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT
          -WorkflowName linux-tina-glfw-x11
          -WorkflowFile linux-tina-glfw-x11.yml
          -ArtifactName linux-tina-glfw-x11-metadata-${{ matrix.compiler }}
          -Branch $env:TINALUX_CI_BASELINE_BRANCH
          -FallbackBranch $env:TINALUX_CI_BASELINE_FALLBACK_BRANCH

      - name: Capture Linux X11 Threshold Warnings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
        run: >
          ./tests/scripts/ci_execution_summary_threshold_guard.ps1
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT
          -WorkflowName linux-tina-glfw-x11
          -SummaryTitle "Linux X11 构建阈值守卫"
          -OverallDurationThresholdSeconds 1200
          -StageThresholds build=1200

      - name: Validate Linux X11 Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_LINUX_X11_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata
        run: >
          ./tests/scripts/ci_metadata_validate.ps1
          -OutputRoot $env:TINALUX_LINUX_X11_METADATA_ROOT

      - name: Upload Linux X11 Metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-tina-glfw-x11-metadata-${{ matrix.compiler }}
          retention-days: 1
          if-no-files-found: warn
          path: |
            ci-artifacts/linux-tina-glfw-x11/${{ matrix.compiler }}/metadata/**

      - name: Upload Linux X11 Build Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-tina-glfw-x11-${{ matrix.compiler }}
          retention-days: 1
          if-no-files-found: warn
          path: |
            build/tina_glfw-linux-x11/${{ matrix.compiler }}/**
