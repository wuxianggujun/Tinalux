name: android-build-scripts-smoke

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/android-build-scripts-smoke.yml"
      - "tests/scripts/ci_metadata_contract_smoke.ps1"
      - "tests/scripts/ci_execution_summary_threshold_guard.ps1"
      - "tests/scripts/ci_metadata_fetch_baseline.ps1"
      - "tests/scripts/ci_metadata_validate.ps1"
      - "tests/scripts/ci_metadata_manifest_helpers.ps1"
      - "scripts/build_android_native.ps1"
      - "scripts/stage_android_validation_artifacts.ps1"
      - "tests/scripts/android_build_scripts_smoke_ci_metadata.ps1"
      - "tests/scripts/android_build_scripts_smoke_stage_run.ps1"
      - "tests/scripts/android_build_scripts_smoke_stage_summary.ps1"
      - "tests/scripts/android_smoke_test_helpers.ps1"
      - "tests/scripts/android_stage_script_smoke.ps1"
      - "tests/scripts/android_build_validate_smoke.ps1"
      - "android/tinalux-sdk/build.gradle.kts"
      - "android/tinalux-sdk/consumer-rules.pro"
      - "android/tinalux-sdk/src/main/AndroidManifest.xml"
  push:
    paths:
      - ".github/workflows/android-build-scripts-smoke.yml"
      - "tests/scripts/ci_metadata_contract_smoke.ps1"
      - "tests/scripts/ci_execution_summary_threshold_guard.ps1"
      - "tests/scripts/ci_metadata_fetch_baseline.ps1"
      - "tests/scripts/ci_metadata_validate.ps1"
      - "tests/scripts/ci_metadata_manifest_helpers.ps1"
      - "scripts/build_android_native.ps1"
      - "scripts/stage_android_validation_artifacts.ps1"
      - "tests/scripts/android_build_scripts_smoke_ci_metadata.ps1"
      - "tests/scripts/android_build_scripts_smoke_stage_run.ps1"
      - "tests/scripts/android_build_scripts_smoke_stage_summary.ps1"
      - "tests/scripts/android_smoke_test_helpers.ps1"
      - "tests/scripts/android_stage_script_smoke.ps1"
      - "tests/scripts/android_build_validate_smoke.ps1"
      - "android/tinalux-sdk/build.gradle.kts"
      - "android/tinalux-sdk/consumer-rules.pro"
      - "android/tinalux-sdk/src/main/AndroidManifest.xml"

permissions:
  actions: read
  contents: read

jobs:
  smoke:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI Metadata Contract Check
        shell: pwsh
        run: ./tests/scripts/ci_metadata_contract_smoke.ps1 -RepoRoot .

      - name: Capture Android Build Scripts Smoke Metadata
        shell: pwsh
        env:
          TINALUX_ANDROID_SMOKE_ARTIFACT_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/android_build_scripts_smoke_ci_metadata.ps1
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT
          -ArtifactsRoot $env:TINALUX_ANDROID_SMOKE_ARTIFACT_ROOT

      - name: Run Android Stage Script Smoke
        shell: pwsh
        env:
          TINALUX_KEEP_TEST_TEMP_ROOT: "1"
          TINALUX_TEST_TEMP_PARENT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/android_build_scripts_smoke_stage_run.ps1
          -Stage stage
          -RepoRoot .
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT

      - name: Run Android Build Validate Smoke
        shell: pwsh
        env:
          TINALUX_KEEP_TEST_TEMP_ROOT: "1"
          TINALUX_TEST_TEMP_PARENT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/android_build_scripts_smoke_stage_run.ps1
          -Stage validate
          -RepoRoot .
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT

      - name: Capture Android Build Scripts Smoke Timings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_ANDROID_SMOKE_ARTIFACT_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/android_build_scripts_smoke_stage_summary.ps1
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT
          -ArtifactsRoot $env:TINALUX_ANDROID_SMOKE_ARTIFACT_ROOT

      - name: Fetch Android Smoke Baseline Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
          TINALUX_CI_BASELINE_BRANCH: ${{ github.base_ref || github.ref_name }}
          TINALUX_CI_BASELINE_FALLBACK_BRANCH: ${{ github.event.repository.default_branch }}
        run: >
          ./tests/scripts/ci_metadata_fetch_baseline.ps1
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT
          -WorkflowName android-build-scripts-smoke
          -WorkflowFile android-build-scripts-smoke.yml
          -ArtifactName android-build-scripts-smoke-metadata
          -Branch $env:TINALUX_CI_BASELINE_BRANCH
          -FallbackBranch $env:TINALUX_CI_BASELINE_FALLBACK_BRANCH

      - name: Capture Android Smoke Threshold Warnings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/ci_execution_summary_threshold_guard.ps1
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT
          -WorkflowName android-build-scripts-smoke
          -SummaryTitle "Android Build Scripts Smoke 阈值守卫"
          -OverallDurationThresholdSeconds 900
          -StageThresholds stage=600,validate=300

      - name: Validate Android Smoke Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_ANDROID_SMOKE_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/android-build-scripts-smoke/metadata
        run: >
          ./tests/scripts/ci_metadata_validate.ps1
          -OutputRoot $env:TINALUX_ANDROID_SMOKE_METADATA_ROOT

      - name: Upload Android Smoke Metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-build-scripts-smoke-metadata
          retention-days: 1
          if-no-files-found: warn
          path: |
            ci-artifacts/android-build-scripts-smoke/metadata/**

      - name: Upload Android Smoke Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-scripts-smoke-artifacts
          retention-days: 1
          path: |
            ci-artifacts/android-build-scripts-smoke/**
