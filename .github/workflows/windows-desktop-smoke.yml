name: windows-desktop-smoke

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-desktop-smoke.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "scripts/runSmokeTests.ps1"
      - "scripts/runSmokeTests.sh"
      - "syncSkia.bat"
      - "main.cpp"
      - "!tests/scripts/android_stage_script_smoke.ps1"
      - "!tests/scripts/android_build_validate_smoke.ps1"
      - "!tests/scripts/android_smoke_test_helpers.ps1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-desktop-smoke.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "scripts/runSmokeTests.ps1"
      - "scripts/runSmokeTests.sh"
      - "syncSkia.bat"
      - "main.cpp"
      - "!tests/scripts/android_stage_script_smoke.ps1"
      - "!tests/scripts/android_build_validate_smoke.ps1"
      - "!tests/scripts/android_smoke_test_helpers.ps1"

permissions:
  actions: read
  contents: read

jobs:
  smoke:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI Metadata Contract Check
        shell: pwsh
        run: ./tests/scripts/ci_metadata_contract_smoke.ps1 -RepoRoot .

      - name: Run Desktop Smoke Contract Check
        shell: pwsh
        run: ./tests/scripts/desktop_smoke_contract_smoke.ps1 -RepoRoot .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore Skia Source Cache
        id: restore-skia-source-cache
        uses: actions/cache/restore@v4
        with:
          path: 3rdparty/skia
          key: windows-skia-source-v1-bootstrap
          restore-keys: |
            windows-skia-source-v1-

      - name: Sync Skia checkout and deps
        shell: cmd
        run: syncSkia.bat

      - name: Capture Skia Revision
        id: skia-meta
        shell: pwsh
        run: |
          $revision = (git -C 3rdparty/skia rev-parse HEAD).Trim()
          "revision=$revision" >> $env:GITHUB_OUTPUT
          Write-Host "Skia revision: $revision"

      - name: Save Skia Source Cache
        if: ${{ steps.skia-meta.outputs.revision != '' && steps.restore-skia-source-cache.outputs.cache-matched-key != format('windows-skia-source-v1-{0}', steps.skia-meta.outputs.revision) }}
        uses: actions/cache/save@v4
        with:
          path: 3rdparty/skia
          key: windows-skia-source-v1-${{ steps.skia-meta.outputs.revision }}

      - name: Restore Skia Build Cache
        id: restore-skia-build-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build-ci/skia
            build-ci/CMakeFiles/tinalux_skia_Debug_gn_signature.txt
            build-ci/CMakeFiles/tinalux_skia_Release_gn_signature.txt
          key: windows-skia-build-v1-${{ steps.skia-meta.outputs.revision }}-${{ hashFiles('cmake/SkiaConfig.cmake') }}
          restore-keys: |
            windows-skia-build-v1-${{ steps.skia-meta.outputs.revision }}-

      - name: Capture Windows Smoke Metadata
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
          TINALUX_SKIA_REVISION: ${{ steps.skia-meta.outputs.revision }}
          TINALUX_SOURCE_CACHE_PRIMARY_KEY: ${{ steps.restore-skia-source-cache.outputs.cache-primary-key }}
          TINALUX_SOURCE_CACHE_MATCHED_KEY: ${{ steps.restore-skia-source-cache.outputs.cache-matched-key }}
          TINALUX_SOURCE_CACHE_HIT: ${{ steps.restore-skia-source-cache.outputs.cache-hit }}
          TINALUX_SOURCE_CACHE_EXPECTED_KEY: windows-skia-source-v1-${{ steps.skia-meta.outputs.revision }}
          TINALUX_BUILD_CACHE_PRIMARY_KEY: ${{ steps.restore-skia-build-cache.outputs.cache-primary-key }}
          TINALUX_BUILD_CACHE_MATCHED_KEY: ${{ steps.restore-skia-build-cache.outputs.cache-matched-key }}
          TINALUX_BUILD_CACHE_HIT: ${{ steps.restore-skia-build-cache.outputs.cache-hit }}
          TINALUX_BUILD_CACHE_EXPECTED_KEY: windows-skia-build-v1-${{ steps.skia-meta.outputs.revision }}-${{ hashFiles('cmake/SkiaConfig.cmake') }}
        run: >
          ./tests/scripts/windows_desktop_smoke_ci_metadata.ps1
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT
          -SkiaRevision $env:TINALUX_SKIA_REVISION
          -SourceCachePrimaryKey $env:TINALUX_SOURCE_CACHE_PRIMARY_KEY
          -SourceCacheMatchedKey $env:TINALUX_SOURCE_CACHE_MATCHED_KEY
          -SourceCacheHit $env:TINALUX_SOURCE_CACHE_HIT
          -SourceCacheExpectedKey $env:TINALUX_SOURCE_CACHE_EXPECTED_KEY
          -BuildCachePrimaryKey $env:TINALUX_BUILD_CACHE_PRIMARY_KEY
          -BuildCacheMatchedKey $env:TINALUX_BUILD_CACHE_MATCHED_KEY
          -BuildCacheHit $env:TINALUX_BUILD_CACHE_HIT
          -BuildCacheExpectedKey $env:TINALUX_BUILD_CACHE_EXPECTED_KEY

      - name: Configure Desktop Smoke Build
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_stage_run.ps1
          -Stage configure
          -BuildDir build-ci
          -Config Debug
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Build Desktop Smoke Tests
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_stage_run.ps1
          -Stage build
          -BuildDir build-ci
          -Config Debug
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Run Desktop Smoke Tests
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_stage_run.ps1
          -Stage test
          -BuildDir build-ci
          -Config Debug
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Capture Windows Smoke Stage Timings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_stage_summary.ps1
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Capture Windows Smoke Test Timings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_test_timings.ps1
          -BuildDir build-ci
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT
          -MaxTests 10

      - name: Fetch Windows Smoke Baseline Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TINALUX_CI_BASELINE_BRANCH: ${{ github.base_ref || github.ref_name }}
          TINALUX_CI_BASELINE_FALLBACK_BRANCH: ${{ github.event.repository.default_branch }}
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/ci_metadata_fetch_baseline.ps1
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT
          -WorkflowName windows-desktop-smoke
          -WorkflowFile windows-desktop-smoke.yml
          -ArtifactName windows-desktop-smoke-metadata
          -Branch $env:TINALUX_CI_BASELINE_BRANCH
          -FallbackBranch $env:TINALUX_CI_BASELINE_FALLBACK_BRANCH

      - name: Capture Windows Smoke Threshold Warnings
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/windows_desktop_smoke_threshold_guard.ps1
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Validate Windows Smoke Metadata
        if: ${{ always() }}
        shell: pwsh
        env:
          TINALUX_CI_METADATA_ROOT: ${{ github.workspace }}/ci-artifacts/windows-desktop-smoke/metadata
        run: >
          ./tests/scripts/ci_metadata_validate.ps1
          -OutputRoot $env:TINALUX_CI_METADATA_ROOT

      - name: Save Skia Build Cache
        if: ${{ success() && steps.skia-meta.outputs.revision != '' && steps.restore-skia-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            build-ci/skia
            build-ci/CMakeFiles/tinalux_skia_Debug_gn_signature.txt
            build-ci/CMakeFiles/tinalux_skia_Release_gn_signature.txt
          key: windows-skia-build-v1-${{ steps.skia-meta.outputs.revision }}-${{ hashFiles('cmake/SkiaConfig.cmake') }}

      - name: Upload Windows Smoke Metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-smoke-metadata
          retention-days: 1
          if-no-files-found: warn
          path: |
            ci-artifacts/windows-desktop-smoke/metadata/**

      - name: Upload CTest Logs On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-smoke-logs
          retention-days: 1
          path: |
            build-ci/Testing/**
            build-ci/CMakeCache.txt
            build-ci/build.ninja
            build-ci/.ninja_log
            build-ci/CMakeFiles/CMakeOutput.log
            build-ci/CMakeFiles/CMakeError.log
            build-ci/CMakeFiles/CMakeConfigureLog.yaml
            ci-artifacts/windows-desktop-smoke/**
